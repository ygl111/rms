# TCP网关配置文件
# 用于配置TCP网关服务器的各种参数

[Server]
# 网关服务监听的TCP端口列表（支持多端口监听不同协议）
# 格式：[Performance]
# 工作线程数（0表示使用CPU核心数）- 增加到32个线程处理高并发
worker_threads = 32

# 消息处理批大小
batch_size = 50

# 队列大小 - 增加到50000避免队列满
queue_size = 50000用逗号分隔
listen_ports = 8081:dp_protocol_v1,8082:dp_protocol_v2,8083:modbus_tcp

# 默认端口（如果listen_ports未配置时使用）
default_port = 8081

# 最大连接数
max_connections = 50000

# 连接超时时间（秒）
connection_timeout = 60

# 消息边界检测超时（毫秒）
message_boundary_timeout = 5000

[Redis]
# Redis服务器的主机地址
host = 127.0.0.1

# Redis服务器的端口号
port = 6379

# Redis连接池大小
connection_pool_size = 200

# Redis连接超时时间（毫秒）
connection_timeout = 2000

# Redis操作超时时间（毫秒）
operation_timeout = 1000

# 用于接收设备原始消息的Stream Key
# C++网关向Redis推送数据时使用的Stream Key
# 后续的C++解析器也必须从这个完全相同的Key来读取数据
request_stream_key = device_raw_messages

# 用于存放待发送响应的List Key
# 解析器处理完消息后，将响应推送到这个队列
response_queue_key = device_responses

# Redis认证密码（如果需要）
# password = your_redis_password

[Protocol]
# 协议配置文件路径
registry_file = config/protocol_registry.json

# 默认协议ID
default_protocol = dp_protocol_v1

# 协议识别超时时间（毫秒）
identification_timeout = 500

[Logging]
# 日志级别：DEBUG, INFO, WARN, ERROR
log_level = WARN

# 是否启用控制台日志
enable_console_log = true

# 是否启用文件日志
enable_file_log = false

# 日志文件路径（如果启用文件日志）
log_file_path = /var/log/tcp_gateway/gateway.log

# 日志文件最大大小（MB）
log_file_max_size = 100

# 日志文件保留天数
log_file_retention_days = 7

[Performance]
# 工作线程数（0表示使用CPU核心数）
worker_threads = 0

# 消息处理批大小
batch_size = 100

# 队列大小
queue_size = 50000

# 心跳间隔（秒）
heartbeat_interval = 15

# 离线检测间隔（秒）
offline_detection_interval = 30

[Security]
# 是否启用IP白名单
enable_ip_whitelist = false

# IP白名单文件路径
whitelist_file = config/ip_whitelist.txt

# 最大消息大小（字节）
max_message_size = 65536

# 是否启用消息校验
enable_message_validation = true

[Monitoring]
# 是否启用性能监控
enable_performance_monitoring = true

# 监控统计间隔（秒）
stats_interval = 300

# 健康检查间隔（秒）
health_check_interval = 30

# 是否启用详细统计
enable_detailed_stats = false